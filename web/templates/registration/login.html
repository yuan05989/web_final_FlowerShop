{% extends 'web/base.html' %}

{% block title %}FlowerShop | 登入{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">會員登入</h1>
        <form method="post">
          {% csrf_token %}
          {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label" for="id_username">帳號</label>
            <input type="text" name="username" autofocus required class="form-control" id="id_username">
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">密碼</label>
            <input type="password" name="password" required class="form-control" id="id_password">
          </div>
          <button class="btn btn-brand text-white w-100" type="submit">登入</button>
          <p class="text-muted small mt-3 mb-0">還沒有帳號？<a href="{% url 'web:register' %}">立即註冊</a></p>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
